<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>픽셀 판타지: 이세계 직업 판정 테스트 | 길을 찾는 발걸음</title>
  <meta name="description" content="나는 이세계에서 어떤 직업을 갖게 될까? 37가지 직업 중 나의 숨겨진 직업을 찾아보세요. 히든 직업도 있다?!">
  <meta name="keywords" content="심리테스트, 이세계직업테스트, 판타지직업, MBTI테스트, 성격유형테스트, 재미있는테스트">
  <meta name="google-adsense-account" content="ca-pub-1678333999276779">
  <meta property="og:title" content="픽셀 판타지: 이세계 직업 판정 테스트">
  <meta property="og:description" content="나는 이세계에서 어떤 직업? 37가지 결과 + 히든 직업!">
  <meta property="og:url" content="https://seeker.kr/contents/test/fantasy-test.html">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --border: #2a2a5a;
      --gold: #ffd700;
      --gold2: #ffaa00;
      --white: #e8e8ff;
      --gray: #6868a8;
      --green: #00ff88;
      --red: #ff4466;
      --blue: #4488ff;
      --purple: #aa44ff;
      --pixel: 'Press Start 2P', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 픽셀 배경 패턴 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(68,136,255,0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(170,68,255,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* ── 공통 픽셀 박스 ── */
    .pixel-box {
      border: 3px solid var(--border);
      background: var(--surface);
      image-rendering: pixelated;
      position: relative;
    }

    .pixel-box::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px; bottom: -3px;
      border: 1px solid rgba(255,255,255,0.05);
      pointer-events: none;
    }

    /* ── 화면 전환 ── */
    .screen { display: none; animation: fadeIn 0.4s ease; }
    .screen.active { display: flex; flex-direction: column; min-height: 100vh; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── 암전 오버레이 ── */
    .fade-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      transition: opacity 0.3s;
    }
    .fade-overlay.active { opacity: 1; pointer-events: auto; }

    /* ══════════════════════════════
       타이틀 화면
    ══════════════════════════════ */
    #screen-title {
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .title-logo {
      font-family: var(--pixel);
      font-size: 0.55rem;
      color: var(--gold);
      line-height: 2;
      margin-bottom: 8px;
      text-shadow: 2px 2px 0 rgba(255,170,0,0.3);
      animation: blink-gold 2s infinite;
    }

    @keyframes blink-gold {
      0%,100% { text-shadow: 2px 2px 0 rgba(255,170,0,0.3); }
      50% { text-shadow: 2px 2px 0 rgba(255,170,0,0.8), 0 0 20px rgba(255,215,0,0.5); }
    }

    .title-sub {
      font-family: var(--pixel);
      font-size: 0.4rem;
      color: var(--gray);
      margin-bottom: 30px;
      line-height: 2;
    }

    .pixel-sprite {
      font-size: 3rem;
      margin: 16px 0;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .press-start {
      font-family: var(--pixel);
      font-size: 0.45rem;
      color: var(--white);
      animation: blink 1s step-end infinite;
      margin: 16px 0 24px;
    }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* 이름 입력 */
    .name-section {
      width: 100%;
      padding: 16px;
      margin-bottom: 20px;
    }

    .name-label {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--gold);
      margin-bottom: 10px;
      line-height: 2;
    }

    .name-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 2px solid var(--gold);
      padding: 10px 12px;
    }

    .name-cursor {
      font-family: var(--pixel);
      color: var(--gold);
      font-size: 0.6rem;
    }

    .name-input {
      background: transparent;
      border: none;
      color: var(--white);
      font-family: var(--pixel);
      font-size: 0.5rem;
      outline: none;
      flex: 1;
      letter-spacing: 2px;
    }

    .name-input::placeholder { color: var(--gray); }

    /* 메뉴 버튼 */
    .menu-btn {
      width: 100%;
      padding: 14px;
      font-family: var(--pixel);
      font-size: 0.45rem;
      cursor: pointer;
      border: 2px solid;
      transition: all 0.1s;
      text-align: left;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .menu-btn.primary {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold2);
    }

    .menu-btn.primary:hover {
      background: var(--gold2);
      transform: translate(2px, 2px);
      box-shadow: -2px -2px 0 rgba(0,0,0,0.5);
    }

    .menu-btn.disabled {
      background: transparent;
      color: var(--gray);
      border-color: var(--border);
      cursor: not-allowed;
      opacity: 0.5;
    }

    /* 프롤로그 */
    #screen-prologue {
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      text-align: center;
    }

    .prologue-box {
      width: 100%;
      padding: 24px;
      border: 2px solid var(--blue);
      background: rgba(0,0,50,0.8);
    }

    .prologue-text {
      font-family: var(--pixel);
      font-size: 0.42rem;
      color: var(--white);
      line-height: 2.5;
      min-height: 80px;
    }

    /* ══════════════════════════════
       테스트 화면
    ══════════════════════════════ */
    #screen-test { padding: 0; }

    /* 상단 HUD */
    .hud {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .hud-stage {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--gold);
    }

    .hud-progress {
      flex: 1;
      margin: 0 12px;
      height: 8px;
      background: var(--border);
      border: 1px solid var(--gray);
      position: relative;
      overflow: hidden;
    }

    .hud-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--gold));
      transition: width 0.3s;
      image-rendering: pixelated;
    }

    .hud-num {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--white);
      white-space: nowrap;
    }

    /* 상황 묘사 영역 */
    .situation-area {
      padding: 16px;
      border-bottom: 2px solid var(--border);
      min-height: 80px;
      background: linear-gradient(180deg, rgba(10,10,40,0.9) 0%, var(--surface) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .situation-emoji {
      font-size: 2.5rem;
      margin-right: 12px;
      animation: float 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .situation-text {
      font-size: 0.75rem;
      color: var(--gray);
      line-height: 1.6;
      font-style: italic;
    }

    /* 질문 대화창 */
    .question-box {
      margin: 16px;
      border: 2px solid var(--blue);
      background: rgba(0,0,50,0.8);
      padding: 16px;
      position: relative;
    }

    .question-box::before {
      content: '▶ 질문';
      position: absolute;
      top: -10px;
      left: 12px;
      font-family: var(--pixel);
      font-size: 0.35rem;
      color: var(--blue);
      background: var(--bg);
      padding: 0 6px;
    }

    .question-text {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.95rem;
      color: var(--white);
      line-height: 1.8;
      min-height: 60px;
      font-weight: 500;
    }

    /* 선택지 */
    .choices {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .choice-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--white);
      padding: 12px 14px;
      text-align: left;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.92rem;
      cursor: pointer;
      transition: all 0.1s;
      line-height: 1.5;
      position: relative;
      overflow: hidden;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.1s;
    }

    .choice-btn:hover {
      border-color: var(--gold);
      background: rgba(255,215,0,0.08);
      transform: translate(2px, 0);
    }

    .choice-btn:hover::before { opacity: 1; }
    .choice-btn:active { transform: translate(2px, 2px); }

    .choice-label {
      font-family: var(--pixel);
      font-size: 0.5rem;
      color: var(--gold);
      margin-right: 10px;
    }

    /* 스테이지 클리어 */
    #screen-stage {
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      text-align: center;
    }

    .stage-clear-title {
      font-family: var(--pixel);
      font-size: 0.7rem;
      color: var(--green);

      margin-bottom: 16px;
      animation: blink-gold 0.5s infinite;
    }

    .stage-next {
      font-family: var(--pixel);
      font-size: 0.45rem;
      color: var(--gold);
      margin-top: 16px;
    }

    /* 로딩 */
    #screen-loading {
      justify-content: center;
      align-items: center;
      padding: 30px 20px;
      text-align: center;
    }

    .loading-text {
      font-family: var(--pixel);
      font-size: 0.4rem;
      color: var(--white);
      line-height: 2.5;
      margin-bottom: 20px;
    }

    .loading-bar-wrap {
      width: 100%;
      height: 20px;
      border: 2px solid var(--gold);
      background: var(--bg);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .loading-bar-fill {
      height: 100%;
      background: repeating-linear-gradient(
        90deg,
        var(--gold) 0px,
        var(--gold) 8px,
        var(--gold2) 8px,
        var(--gold2) 16px
      );
      width: 0%;
      transition: width 0.1s linear;
    }

    .loading-pct {
      font-family: var(--pixel);
      font-size: 0.45rem;
      color: var(--gold);
    }

    /* ══════════════════════════════
       결과 화면
    ══════════════════════════════ */
    #screen-result {
      padding: 0 0 40px;
    }

    .result-header {
      background: linear-gradient(180deg, #1a0a2a 0%, var(--surface) 100%);
      padding: 20px 16px;
      border-bottom: 2px solid var(--border);
      text-align: center;
    }

    .result-level {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--gold);
      margin-bottom: 6px;
    }

    .result-job-name {
      font-family: var(--pixel);
      font-size: 0.7rem;
      color: var(--gold);
      line-height: 1.8;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      margin-bottom: 4px;
      animation: blink-gold 2s infinite;
    }

    .result-job-en {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--gray);
      margin-bottom: 16px;
    }

    .result-sprite {
      font-size: 4rem;
      margin: 8px 0;
      animation: float 2s ease-in-out infinite;
    }

    .result-grade {
      display: inline-block;
      font-family: var(--pixel);
      font-size: 0.4rem;
      padding: 4px 12px;
      border: 2px solid;
      margin-top: 8px;
    }

    .grade-SSR { color: var(--gold); border-color: var(--gold); background: rgba(255,215,0,0.1); }
    .grade-SR  { color: var(--purple); border-color: var(--purple); background: rgba(170,68,255,0.1); }
    .grade-R   { color: var(--blue); border-color: var(--blue); background: rgba(68,136,255,0.1); }
    .grade-UR  { color: var(--red); border-color: var(--red); background: rgba(255,68,102,0.1); animation: blink-gold 0.8s infinite; }

    /* 스탯 */
    .stat-section {
      padding: 16px;
      border-bottom: 2px solid var(--border);
    }

    .section-title {
      font-family: var(--pixel);
      font-size: 0.38rem;
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }

    .stat-name {
      font-family: var(--pixel);
      font-size: 0.35rem;
      color: var(--gray);
      width: 30px;
      flex-shrink: 0;
    }

    .stat-bar {
      flex: 1;
      height: 10px;
      background: var(--border);
      border: 1px solid var(--gray);
      overflow: hidden;
    }

    .stat-bar-fill {
      height: 100%;
      background: var(--green);
      transition: width 0.8s ease;
      image-rendering: pixelated;
    }

    .stat-num {
      font-family: var(--pixel);
      font-size: 0.35rem;
      color: var(--white);
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    /* 설명 */
    .desc-section {
      padding: 16px;
      border-bottom: 2px solid var(--border);
    }

    .job-desc {
      font-size: 0.88rem;
      color: var(--white);
      line-height: 1.8;
      margin-bottom: 12px;
    }

    /* 패시브 스킬 */
    .skill-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    .skill-item {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .skill-icon { font-size: 1.2rem; flex-shrink: 0; }

    .skill-name {
      font-family: var(--pixel);
      font-size: 0.35rem;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .skill-desc {
      font-size: 0.78rem;
      color: var(--gray);
      line-height: 1.5;
    }

    /* 상성 */
    .synergy-section {
      padding: 16px;
      border-bottom: 2px solid var(--border);
    }

    .synergy-row {
      display: flex;
      gap: 8px;
    }

    .synergy-card {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
    }

    .synergy-label {
      font-family: var(--pixel);
      font-size: 0.32rem;
      margin-bottom: 6px;
    }

    .synergy-label.good { color: var(--green); }
    .synergy-label.bad  { color: var(--red); }

    .synergy-job {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
    }

    /* 하단 버튼 */
    .result-btns {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-btn {
      width: 100%;
      padding: 13px;
      font-family: var(--pixel);
      font-size: 0.38rem;
      cursor: pointer;
      border: 2px solid;
      transition: all 0.1s;
      letter-spacing: 1px;
    }

    .result-btn.primary {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold2);
    }

    .result-btn.secondary {
      background: transparent;
      color: var(--white);
      border-color: var(--border);
    }

    .result-btn.green {
      background: rgba(0,255,136,0.1);
      color: var(--green);
      border-color: var(--green);
    }

    .result-btn:hover { transform: translate(2px, 2px); }

    /* ── PC 반응형 ── */
    @media (min-width: 600px) {
      .wrap { max-width: 600px; }
      .title-logo { font-size: 0.75rem; }
      .title-sub  { font-size: 0.55rem; }
      .press-start { font-size: 0.6rem; }
      .name-label  { font-size: 0.5rem; }
      .name-input  { font-size: 0.65rem; }
      .menu-btn    { font-size: 0.58rem; padding: 16px; }
      .prologue-text { font-size: 0.6rem; }
      .hud-stage, .hud-num { font-size: 0.5rem; }
      .situation-text { font-size: 0.9rem; }
      .situation-emoji { font-size: 3rem; }
      .question-text  { font-size: 1.05rem; }
      .choice-btn     { font-size: 1rem; padding: 14px 16px; }
      .choice-label   { font-size: 0.55rem; }
      .loading-text   { font-size: 0.6rem; }
      .loading-pct    { font-size: 0.6rem; }
      .stage-clear-title { font-size: 0.9rem; }
      .stage-next     { font-size: 0.6rem; }
      .result-level   { font-size: 0.5rem; }
      .result-job-name { font-size: 0.9rem; }
      .result-job-en  { font-size: 0.5rem; }
      .section-title  { font-size: 0.5rem; }
      .job-desc       { font-size: 0.95rem; }
      .skill-name     { font-size: 0.45rem; }
      .skill-desc     { font-size: 0.85rem; }
      .synergy-label  { font-size: 0.42rem; }
      .synergy-job    { font-size: 0.95rem; }
      .result-btn     { font-size: 0.5rem; padding: 15px; }
    }

    /* 반응형 */
    @media (max-width: 360px) {
      .title-logo { font-size: 0.45rem; }
      .question-text { font-size: 0.85rem; }
      .choice-btn { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="fade-overlay" id="fadeOverlay"></div>

<div class="wrap">

  <!-- ── 타이틀 화면 ── -->
  <div class="screen active" id="screen-title">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px">
      <div class="title-logo">
        ★ PIXEL FANTASY ★<br>
        이세계 직업 판정 테스트
      </div>
      <div class="pixel-sprite">⚔️</div>
      <div class="title-sub">
        당신의 숨겨진 직업을 밝혀드립니다<br>
        총 37가지 직업 + 히든 직업 존재
      </div>
      <div class="press-start">[ PRESS START BUTTON ]</div>

      <div class="pixel-box name-section">
        <div class="name-label">▶ 구원자의 이름을 입력하세요 (최대 5자)</div>
        <div class="name-input-wrap">
          <span class="name-cursor">▶</span>
          <input type="text" class="name-input" id="nameInput" maxlength="5" placeholder="이름 입력...">
        </div>
      </div>

      <button class="menu-btn primary" onclick="startGame()">
        ☞ NEW GAME (처음부터 환생하기)
      </button>
      <button class="menu-btn disabled" disabled>
        &nbsp;&nbsp; CONTINUE (치트키로 시작하기)
      </button>
    </div>
  </div>

  <!-- ── 프롤로그 화면 ── -->
  <div class="screen" id="screen-prologue">
    <div class="prologue-box pixel-box">
      <div class="prologue-text" id="prologueText"></div>
    </div>
    <button class="menu-btn primary" style="margin-top:20px" onclick="startTest()" id="prologueBtn" style="display:none">
      ▶ 여정을 시작합니다
    </button>
  </div>

  <!-- ── 스테이지 클리어 ── -->
  <div class="screen" id="screen-stage">
    <div class="stage-clear-title" id="stageClearText">STAGE CLEAR!</div>
    <div style="font-size:3rem;margin:20px 0">🎊</div>
    <div class="stage-next" id="stageNextText"></div>
  </div>

  <!-- ── 테스트 화면 ── -->
  <div class="screen" id="screen-test">
    <div class="hud">

let state = {
  name: '구원자',
  currentQ: 0,
  scores: {STR:0, INT:0, AGI:0, VIT:0, LUK:0},
  lazyCount: 0,
  aggressiveCount: 0,

const STAGE_NAMES = ['', 'STAGE 1: 이세계 각성', 'STAGE 2: 모험의 서막', 'STAGE 3: 시련의 관문', 'STAGE 4: 운명의 선택'];
const LOADING_MSGS = [
  '전생 기억 파편을 맞추는 중...',
  '직업 적성 데이터를 분석하는 중...',

  '이세계 신이 당신을 심사하는 중...',
];

// ═══════════════════════════════════════════════════════
// 4. 화면 전환
// ═══════════════════════════════════════════════════════
function showScreen(id, delay = 300) {
  const overlay = document.getElementById('fadeOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    overlay.classList.remove('active');
  }, delay);
}

function fadeTransition(callback, delay = 300) {
  const overlay = document.getElementById('fadeOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    callback();
    overlay.classList.remove('active');
  }, delay);
}

// ═══════════════════════════════════════════════════════
// 5. 타이핑 효과
// ═══════════════════════════════════════════════════════
function typeWrite(el, text, speed = 30, callback) {
  el.textContent = '';
  let i = 0;
  const timer = setInterval(() => {
    if (i < text.length) {
      el.textContent += text[i++];
    } else {
      clearInterval(timer);
      if (callback) callback();
    }
  }, speed);
}

// ═══════════════════════════════════════════════════════
// 6. 게임 진행
// ═══════════════════════════════════════════════════════
function startGame() {
  const nameInput = document.getElementById('nameInput').value.trim();
  state.name = nameInput || '구원자';

  showScreen('prologue');
  setTimeout(() => {
    const txt = document.getElementById('prologueText');
    const msgs = [
      '코드를 분석 중입니다...',
      `당신의 영혼이 대륙의 운명을 바꿀지 모릅니다.`,
      `구원자 [${state.name}]의 연대기를 시작합니다. ▶`
    ];
    let mi = 0;
    function nextMsg() {
      if (mi < msgs.length) {
        txt.textContent = msgs[mi];
        mi++;
        setTimeout(nextMsg, 1500);
      } else {
        document.getElementById('prologueBtn').style.display = 'block';
      }
    }
    nextMsg();
  }, 400);
}

function startTest() {
  state.currentQ = 0;
  state.scores = {STR:0, INT:0, AGI:0, VIT:0, LUK:0};
  state.lazyCount = 0;
  state.aggressiveCount = 0;
  showScreen('test');
  setTimeout(() => renderQuestion(), 400);
}

function renderQuestion() {
  const q = QUESTIONS[state.currentQ];
  if (!q) return;
  const total = QUESTIONS.length;

  // HUD 업데이트
  document.getElementById('hudStage').textContent = STAGE_NAMES[q.stage] || 'STAGE';
  document.getElementById('progressFill').style.width = `${(state.currentQ / total) * 100}%`;
  document.getElementById('hudNum').textContent = `${state.currentQ + 1} / ${total}`;

  // 상황
  document.getElementById('situationEmoji').textContent = q.emoji;
  document.getElementById('situationText').textContent = q.situation;

  // 질문 표시 (타이밍 안정화를 위해 requestAnimationFrame 사용)
  const qEl = document.getElementById('questionText');
  qEl.textContent = '';
  requestAnimationFrame(() => {
    typeWrite(qEl, q.question, 20);
  });

  // 선택지
  const area = document.getElementById('choicesArea');
  area.innerHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">[${labels[i]}]</span>${c.text}`;
    btn.onclick = () => selectChoice(c);
    area.appendChild(btn);
  });
}

function selectChoice(choice) {
  // 스탯 누적
  Object.entries(choice.stats).forEach(([k,v]) => {
    state.scores[k] = (state.scores[k] || 0) + v;
  });

  // 히든 조건 추적
  if (choice.hidden === 'lazy') state.lazyCount++;
  if ((choice.stats.STR || 0) >= 2) state.aggressiveCount++;

  state.currentQ++;

  // 스테이지 체크
  const prev = QUESTIONS[state.currentQ - 1];
  const curr = QUESTIONS[state.currentQ];

  if (state.currentQ >= QUESTIONS.length) {
    // 완료 → 로딩
    showLoading();
    return;
  }

  if (curr && curr.stage !== prev.stage) {
    // 스테이지 클리어
    showStageClear(prev.stage, curr.stage);
  } else {
    fadeTransition(() => renderQuestion(), 200);
  }
}

function showStageClear(clearedStage, nextStage) {
  showScreen('stage');
  document.getElementById('stageClearText').textContent = `STAGE ${clearedStage} CLEAR!`;
  document.getElementById('stageNextText').textContent = `▶ ${STAGE_NAMES[nextStage]} 진입`;
  setTimeout(() => {
    showScreen('test');
    setTimeout(() => renderQuestion(), 400);
  }, 2000);
}

function showLoading() {
  showScreen('loading');
  const bar = document.getElementById('loadingBar');
  const pct = document.getElementById('loadingPct');
  const txt = document.getElementById('loadingText');
  let progress = 0;
  let msgIdx = 0;

  const timer = setInterval(() => {
    progress += Math.random() * 8 + 2;

// 7. 직업 판정
// ═══════════════════════════════════════════════════════
function determineJob() {
  const s = state.scores;
  const total = Object.values(s).reduce((a,b) => a+b, 0);

  // 히든 필터 1: 슬라임 (공격 의지 전무)
  if (state.aggressiveCount === 0) return JOBS.SLIME;

  // 히든 필터 2: 만년 초보자 (게으른 선택만)
  if (state.lazyCount >= 5) return JOBS.ROOKIE;

  // 히든 필터 3: 마왕성 치킨 (도주+게으름)
  if (state.lazyCount >= 3 && (s.AGI || 0) > (s.STR || 0) * 2) return JOBS.CHICKEN;

  // 히든 필터 4: 전설의 농부 (VIT 극단)
  if ((s.VIT || 0) >= 12 && (s.AGI || 0) <= 4) return JOBS.FARMER;

  // 일반 판정: 최고 스탯 조합
  const sorted = Object.entries(s).sort((a,b) => b[1]-a[1]);
  const top1 = sorted[0][0];
  const top2 = sorted[1][0];
  const isAlt = sorted[0][1] - sorted[1][1] <= 2; // 1,2위 차이가 작으면 혼합형

  // 판정 테이블
  const jobMap = {
    'VIT_STR': JOBS.PALADIN, 'STR_VIT': JOBS.PALADIN,
    'STR_AGI': JOBS.MARTIAL, 'AGI_STR': JOBS.ASSASSIN,
    'INT_STR': JOBS.MAGIC_SWORD, 'STR_INT': JOBS.BERSERKER,
    'VIT_INT': JOBS.HIGH_PRIEST, 'INT_VIT': JOBS.CHRONO,
    'LUK_AGI': JOBS.BARD, 'AGI_LUK': JOBS.THIEF,
    'INT_LUK': JOBS.HEXER, 'LUK_INT': JOBS.SHAMAN,
    'AGI_INT': JOBS.SNIPER, 'INT_AGI': JOBS.GUNNER,
    'LUK_STR': JOBS.BERSERKER, 'STR_LUK': JOBS.MARTIAL,
    'VIT_AGI': JOBS.SHADOW, 'AGI_VIT': JOBS.DANCER,
    'INT_AGI': JOBS.PUPPETEER, 'LUK_VIT': JOBS.BEASTMASTER,
    'VIT_LUK': JOBS.ALCHEMIST, 'AGI_LUK': JOBS.RANGER,
    'STR_LUK': JOBS.ENGINEER, 'LUK_STR': JOBS.TRAPPER,
  };

  const key = `${top1}_${top2}`;
  return jobMap[key] || (() => {
    // fallback: 단일 최고 스탯
    const fallback = { STR: JOBS.BERSERKER, INT: JOBS.ARCHMAGE, AGI: JOBS.ASSASSIN, VIT: JOBS.PALADIN, LUK: JOBS.SHAMAN };
    return fallback[top1] || JOBS.MAGIC_SWORD;
  })();
}

function showResult() {
  const job = determineJob();
  showScreen('result');

  setTimeout(() => {
    document.getElementById('resultLevel').textContent = `[Lv.99] ${state.name}님의 직업`;
    document.getElementById('resultSprite').textContent = job.emoji;
    document.getElementById('resultJobName').textContent = job.name;
    document.getElementById('resultJobEn').textContent = `JOB: ${job.en}`;

    const gradeEl = document.getElementById('resultGrade');
    gradeEl.textContent = `[ ${job.grade} ]`;
    gradeEl.className = `result-grade grade-${job.grade}`;

    // 스탯 바
    const statsEl = document.getElementById('statBars');
    const statNames = {STR:'STR', INT:'INT', AGI:'AGI', VIT:'VIT', LUK:'LUK'};
    const statColors = {STR:'#ff4466', INT:'#4488ff', AGI:'#00ff88', VIT:'#ffaa00', LUK:'#aa44ff'};
    statsEl.innerHTML = Object.entries(job.stats).map(([k,v]) => `
      <div class="stat-row">
        <div class="stat-name">${k}</div>
        <div class="stat-bar">
          <div class="stat-bar-fill" style="width:0%;background:${statColors[k]}" data-target="${v*20}"></div>
        </div>
        <div class="stat-num">${'■'.repeat(v)}${'□'.repeat(5-v)}</div>
      </div>`).join('');

    // 스탯 바 애니메이션
    setTimeout(() => {
      document.querySelectorAll('.stat-bar-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    }, 100);

    document.getElementById('jobDesc').textContent = job.desc;

    // 스킬 목록
    document.getElementById('skillList').innerHTML = job.skills.map(sk => `
      <div class="skill-item">
        <div class="skill-icon">${sk.icon}</div>
        <div>
          <div class="skill-name">[패시브] ${sk.name}</div>
          <div class="skill-desc">${sk.desc}</div>
        </div>
      </div>`).join('');

    document.getElementById('synergyGood').textContent = job.good;
    document.getElementById('synergyBad').textContent = job.bad;

  }, 400);
}

// 이미지 저장 (html2canvas)
function saveResultImage() {
  const btn = event.target;
  btn.textContent = '📸 캡처 중...';
  btn.disabled = true;

  // html2canvas 동적 로드
  if (!window.html2canvas) {
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
    script.onload = () => captureResult(btn);
    document.head.appendChild(script);
  } else {
    captureResult(btn);
  }
}

function captureResult(btn) {
  const target = document.getElementById('screen-result');
  html2canvas(target, {
    backgroundColor: '#0a0a1a',
    scale: 2,
    useCORS: true,
    logging: false,
  }).then(canvas => {
    const link = document.createElement('a');
    const jobName = document.getElementById('resultJobName').textContent;
    link.download = `이세계직업_${state.name}_${jobName}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '💾 SAVE (결과 카드 이미지 저장)';
    btn.disabled = false;
  }).catch(() => {
    alert('이미지 저장 중 오류가 발생했습니다. 스크린샷을 이용해주세요!');
    btn.textContent = '💾 SAVE (결과 카드 이미지 저장)';
    btn.disabled = false;
  });
}

// 링크 공유
function shareResult() {
  const jobName = document.getElementById('resultJobName').textContent;
  const url = window.location.href.split('?')[0];
  const text = `[픽셀 판타지] 나의 이세계 직업은 "${jobName}"!\n너는 어떤 직업인지 테스트해봐!`;
  if (navigator.share) {
    navigator.share({ title: '픽셀 판타지: 이세계 직업 판정', text, url }).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(url).then(() => {
      alert('테스트 링크가 복사되었습니다! 친구에게 공유해보세요 🎮');
    }).catch(() => { prompt('아래 링크를 복사하세요:', url); });
  }
}

  state = { name: state.name, currentQ: 0, scores: {STR:0,INT:0,AGI:0,VIT:0,LUK:0}, lazyCount:0, aggressiveCount:0 };
  showScreen('title');
}
