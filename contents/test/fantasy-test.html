<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>픽셀 판타지: 이세계 직업 판정 테스트 | 길을 찾는 발걸음</title>
  <meta name="description" content="나는 이세계에서 어떤 직업을 갖게 될까? 37가지 직업 중 나의 숨겨진 직업을 찾아보세요. 히든 직업도 있다?!">
  <meta name="keywords" content="심리테스트, 이세계직업테스트, 판타지직업, MBTI테스트, 성격유형테스트, 재미있는테스트">
  <meta name="google-adsense-account" content="ca-pub-1678333999276779">
  <meta property="og:title" content="픽셀 판타지: 이세계 직업 판정 테스트">
  <meta property="og:description" content="나는 이세계에서 어떤 직업? 37가지 결과 + 히든 직업!">
  <meta property="og:url" content="https://seeker.kr/contents/test/fantasy-test.html">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="fantasy-test.css">
</head>
<body>

<div class="fade-overlay" id="fadeOverlay"></div>

<div class="wrap">

  <!-- ── 타이틀 화면 ── -->
  <div class="screen active" id="screen-title">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px">
      <div class="title-logo">
        ★ PIXEL FANTASY ★<br>
        이세계 직업 판정 테스트
      </div>
      <div class="pixel-sprite">⚔️</div>
      <div class="title-sub">
        당신의 숨겨진 직업을 밝혀드립니다<br>
        총 37가지 직업 + 히든 직업 존재
      </div>
      <div class="press-start">[ PRESS START BUTTON ]</div>

      <div class="pixel-box name-section">
        <div class="name-label">▶ 구원자의 이름을 입력하세요 (최대 5자)</div>
        <div class="name-input-wrap">
          <span class="name-cursor">▶</span>
          <input type="text" class="name-input" id="nameInput" maxlength="5" placeholder="이름 입력...">
        </div>
      </div>

      <button class="menu-btn primary" onclick="startGame()">
        ☞ NEW GAME (처음부터 환생하기)
      </button>
      <button class="menu-btn disabled" disabled>
        &nbsp;&nbsp; CONTINUE (치트키로 시작하기)
      </button>
    </div>
  </div>

  <!-- ── 프롤로그 화면 ── -->
  <div class="screen" id="screen-prologue">
    <div class="prologue-box pixel-box">
      <div class="prologue-text" id="prologueText"></div>
    </div>
    <button class="menu-btn primary" style="margin-top:20px" onclick="startTest()" id="prologueBtn" style="display:none">
      ▶ 여정을 시작합니다
    </button>
  </div>

  <!-- ── 스테이지 클리어 ── -->
  <div class="screen" id="screen-stage">
    <div class="stage-clear-title" id="stageClearText">STAGE CLEAR!</div>
    <div style="font-size:3rem;margin:20px 0">🎊</div>
    <div class="stage-next" id="stageNextText"></div>
  </div>

  <!-- ── 테스트 화면 ── -->
  <div class="screen" id="screen-test">
    <div class="hud">
      <div class="hud-stage" id="hudStage">STAGE 1</div>
      <div class="hud-progress">
        <div class="hud-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="hud-num" id="hudNum">0 / 20</div>
    </div>

    <div class="situation-area">
      <div class="situation-emoji" id="situationEmoji">⚔️</div>
      <div class="situation-text" id="situationText"></div>
    </div>

    <div class="question-box pixel-box">
      <div class="question-text" id="questionText"></div>
    </div>

    <div class="choices" id="choicesArea"></div>
  </div>

  <!-- ── 로딩 화면 ── -->
  <div class="screen" id="screen-loading">
    <div style="font-size:3rem;margin-bottom:20px;animation:float 1s ease-in-out infinite">🔮</div>
    <div class="loading-text" id="loadingText">전생 기억 파편을 맞추는 중...</div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill" id="loadingBar"></div>
    </div>
    <div class="loading-pct" id="loadingPct">0%</div>
  </div>

  <!-- ── 결과 화면 ── -->
  <div class="screen" id="screen-result">
    <div class="result-header">
      <div class="result-level" id="resultLevel">[Lv.99] 구원자</div>
      <div class="result-sprite" id="resultSprite">⚔️</div>
      <div class="result-job-name" id="resultJobName">직업명</div>
      <div class="result-job-en" id="resultJobEn">Job Name</div>
      <div class="result-grade" id="resultGrade">SSR</div>
    </div>

    <div class="stat-section">
      <div class="section-title">■ STATUS</div>
      <div id="statBars"></div>
    </div>

    <div class="desc-section">
      <div class="section-title">■ CHARACTER INFO</div>
      <div class="job-desc" id="jobDesc"></div>
      <div class="section-title" style="margin-top:16px">■ PASSIVE SKILL</div>
      <div class="skill-list" id="skillList"></div>
    </div>

    <div class="synergy-section">
      <div class="section-title">■ PARTY SYNERGY</div>
      <div class="synergy-row">
        <div class="synergy-card">
          <div class="synergy-label good">🤝 찰떡 파티원</div>
          <div class="synergy-job" id="synergyGood">—</div>
        </div>
        <div class="synergy-card">
          <div class="synergy-label bad">💢 트롤러</div>
          <div class="synergy-job" id="synergyBad">—</div>
        </div>
      </div>
    </div>

    <div class="result-btns">
      <button class="result-btn primary" onclick="saveResultImage()">💾 SAVE (결과 카드 이미지 저장)</button>
      <button class="result-btn primary" style="background:var(--green);color:var(--bg);border-color:var(--green)" onclick="shareResult()">🔗 SHARE (링크 공유)</button>
      <button class="result-btn green" onclick="goToTests()">🍻 모험가 주점으로 돌아가기</button>
      <button class="result-btn secondary" onclick="retryGame()">🔄 RETRY (다시 환생하기)</button>
    </div>
  </div>

</div>

<script src="fantasy-test.js"></script>
</body>
</html>
