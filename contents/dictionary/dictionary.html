function switchTab(tab) {
  ['cheongan','jiji','oheng','sipsung','etc'].forEach(t => {
    document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
    document.getElementById('panel-'+t)?.classList.toggle('hidden', t!==tab);
  });
}

function openModal(title, body) {
  document.getElementById('dictModalTitle').innerHTML = title;
  document.getElementById('dictModalBody').innerHTML = body;
  document.getElementById('dictModal').classList.add('open');
}
function closeModal() { document.getElementById('dictModal').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id==='dictModal') closeModal(); }

function renderCheongan() {
  const grid = document.getElementById('cheonganGrid');
  grid.innerHTML = CHEONGAN.map((c,i) => `
    <div class="dict-card" onclick="openCGModal(${i})">
      <div class="dict-card-top">
        <span class="dict-hanja ${OH_COLOR[c.oh]}">${c.hanja}</span>
        <div>
          <div class="dict-kor">${c.kor} · ${c.oh} · ${c.yin}</div>
        </div>
      </div>
      <div class="dict-badges">
        ${c.keyword.map(k=>`<span class="dict-badge">${k}</span>`).join('')}
      </div>
      <div class="dict-desc">${c.desc.slice(0,30)}...</div>
    </div>`).join('');
}

          <div style="font-weight:700;color:#8a6020">양(陽)</div>
          <div style="font-size:0.75rem;color:#888;margin-top:4px">밝음·활동·강함<br>甲丙戊庚壬<br>子寅辰午申戌</div>
        </div>
        <div style="flex:1;background:#f0f4fa;border-radius:10px;padding:12px;text-align:center">
          <div style="font-size:1.5rem;margin-bottom:4px">🌙</div>
          <div style="font-weight:700;color:#1a3d7a">음(陰)</div>
          <div style="font-size:0.75rem;color:#888;margin-top:4px">어둠·정적·부드러움<br>乙丁己辛癸<br>丑卯巳未酉亥</div>
        </div>
      </div>
    </div>

    <div class="etc-section">
      <div class="etc-title">상생 상극 (相生 相剋)</div>
      <div class="etc-desc">
        <strong>상생(相生)</strong> — 서로 도와주는 관계<br>
        木→火→土→金→水→木 (순환)<br><br>
        <strong>상극(相剋)</strong> — 서로 억제하는 관계<br>
        木→土→水→火→金→木 (순환)
      </div>
    </div>

    <div class="etc-section">
      <div class="etc-title">60갑자 (六十甲子)</div>
      <div class="etc-desc">천간 10개와 지지 12개의 조합으로 60가지 간지가 만들어집니다. 60년을 주기로 순환합니다.</div>
      <div class="ganzhi-grid" style="margin-top:10px">${ganzhi60}</div>
    </div>

    <div class="etc-section">
      <div class="etc-title">사주(四柱)란?</div>
      <div class="etc-desc">태어난 년·월·일·시 네 가지 기둥(四柱)을 말합니다. 각 기둥은 천간(天干)과 지지(地支)로 이루어져 총 8글자(八字)가 됩니다. 이를 사주팔자(四柱八字)라고 합니다.</div>
    </div>

    <div class="etc-section">
      <div class="etc-title">절기(節氣)란?</div>
      <div class="etc-desc">1년을 24등분한 계절의 기준점입니다. 사주에서 월주는 생일이 아닌 절기 기준으로 바뀝니다. 특히 입춘(立春)은 년주가 바뀌는 기준이 됩니다.</div>
      <div style="margin-top:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px">
        ${['소한','입춘','경칩','청명','입하','망종','소서','입추','백로','한로','입동','대설'].map((j,i)=>`
          <div style="text-align:center;padding:6px;background:#f9f9f9;border-radius:6px;font-size:0.72rem;color:#555">${j}<br><span style="color:#aaa">${i+1}월기준</span></div>`).join('')}
      </div>
    </div>
  `;
}
